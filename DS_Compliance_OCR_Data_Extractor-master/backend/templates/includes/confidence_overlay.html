{# Confidence overlay SVG — positioned absolutely over the page image.
   Usage: {% include "includes/confidence_overlay.html" with page=page_result img_width=800 img_height=1000 %} #}
<div id="confidence-overlay" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;">
  <svg viewBox="0 0 {{ img_width|default:800 }} {{ img_height|default:1000 }}"
       xmlns="http://www.w3.org/2000/svg"
       style="position:absolute; top:0; left:0; width:100%; height:100%;">
    {% for flag in page.flags.all %}
      {% if flag.polygon_json and not flag.reviewed %}
        {% with pts=flag.polygon_json %}
          {# Polygon is a flat list [x0,y0,x1,y1,...] — draw as polygon #}
          <polygon
            data-flag="{{ flag.id }}"
            points="{% for i in pts|dictsort:0 %}{% endfor %}{{ pts|join:',' }}"
            fill="{% if flag.confidence_level == 'low' %}rgba(220,38,38,0.25){% elif flag.confidence_level == 'medium' %}rgba(217,119,6,0.25){% else %}rgba(5,150,105,0.25){% endif %}"
            stroke="{% if flag.confidence_level == 'low' %}#DC2626{% elif flag.confidence_level == 'medium' %}#D97706{% else %}#059669{% endif %}"
            stroke-width="1.5"
            class="opacity-75 transition-opacity cursor-pointer"/>
        {% endwith %}
      {% endif %}
    {% endfor %}
  </svg>
</div>
