{% extends "layout/app_shell.html" %}

{% block breadcrumbs %}{{ page_title }}{% endblock %}

{% block content %}
<section class="rounded-xl border border-slate-200 bg-white p-8 shadow-sm">
  <h1 class="text-2xl font-bold text-slate-900">{{ page_title }}</h1>
  <p class="mt-3 text-slate-600">{{ page_description }}</p>
  {% if job_id %}
    <p class="mt-4 rounded-md bg-slate-100 px-3 py-2 text-sm text-slate-700">
      Job ID: <span class="font-mono">{{ job_id }}</span>
    </p>
  {% endif %}
</section>
{% endblock %}
