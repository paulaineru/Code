name: oryx

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.production}
      # Override .env values that differ inside Docker
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      UPLOAD_DIR: /data/uploads
      EXPORT_DIR: /data/exports
      MONGODB_URI: mongodb://mongodb:27017/
      MONGODB_DB: oryx
    env_file:
      - .env
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run python manage.py collectstatic --noinput &&
             if [ \"$${DJANGO_SEED_USERS:-0}\" = \"1\" ]; then uv run python manage.py seed_users; fi &&
             uv run gunicorn config.wsgi:application --bind 0.0.0.0:8343 --workers 3 --timeout 300"
    volumes:
      - ./backend:/app
      - /data/exports:/data/exports
    ports:
      - "8343:8343"   # direct access for dev; nginx proxies this in production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.production}
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      UPLOAD_DIR: /data/uploads
      EXPORT_DIR: /data/exports
      MONGODB_URI: mongodb://mongodb:27017/
      MONGODB_DB: oryx
    env_file:
      - .env
    command: uv run celery -A config worker --loglevel=info --concurrency=2 --max-tasks-per-child=50
    volumes:
      - ./backend:/app
      - /data/exports:/data/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy


  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/staticfiles:/app/staticfiles:ro
      - /etc/pki/tls/certs/STAR_nssfug_org.crt:/etc/nginx/ssl/server.crt:ro
      - /etc/pki/tls/private/Sectigo_nssfug_wildcard.key:/etc/nginx/ssl/server.key:ro
      - /etc/pki/tls/certs/SectigoFullChain.pem:/etc/nginx/ssl/chain.pem:ro
    depends_on:
      - web

volumes:
  pgdata:
  redisdata:
  mongodata:
